name: Release PennSay

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "PENNSAY_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PENNSAY_BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"

      - name: Build release artifacts
        run: make release

      - name: Upload versioned app bundle
        uses: actions/upload-artifact@v4
        with:
          name: PennSay-app-bundle
          path: build/PennSay-v${{ env.PENNSAY_VERSION }}.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/PennSay-v${{ env.PENNSAY_VERSION }}.zip
            build/PennSay-v${{ env.PENNSAY_VERSION }}.dmg
            build/PennSay-v${{ env.PENNSAY_VERSION }}.sha256
