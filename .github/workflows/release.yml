name: Release PennSay

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # needed for git rev-list since last version tag

      - name: Install dependencies
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "PENNSAY_VERSION=$VERSION" >> "$GITHUB_ENV"
          # Build number intentionally NOT set — scripts/build.sh derives a
          # globally monotonic CFBundleVersion from the fixed build base tag.
          # It no longer resets when MARKETING_VERSION changes.

      - name: Build release artifacts
        run: make release

      - name: Read actual build number
        run: |
          PLIST="$HOME/.voiceinput-build/Release/PennSay.app/Contents/Info.plist"
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")
          echo "PENNSAY_BUILD=$BUILD" >> "$GITHUB_ENV"

      - name: Upload versioned app bundle
        uses: actions/upload-artifact@v4
        with:
          name: PennSay-app-bundle
          path: build/PennSay-v${{ env.PENNSAY_VERSION }}.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |

            ---
            Build: ${{ env.PENNSAY_BUILD }}
          files: |
            build/PennSay-v${{ env.PENNSAY_VERSION }}.zip
            build/PennSay-v${{ env.PENNSAY_VERSION }}.dmg
            build/PennSay-v${{ env.PENNSAY_VERSION }}.sha256
