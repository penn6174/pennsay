name: Release macOS App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project doubao-murmur.xcodeproj \
            -scheme doubao-murmur \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION=YES \
            build

      - name: Package app
        run: |
          APP_PATH="build/Build/Products/Release/Doubao Murmur.app"
          cd "$(dirname "$APP_PATH")"
          zip -r -y "Doubao-Murmur-${GITHUB_REF_NAME}.zip" "Doubao Murmur.app"
          echo "ARTIFACT_PATH=$(pwd)/Doubao-Murmur-${GITHUB_REF_NAME}.zip" >> "$GITHUB_ENV"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ARTIFACT_PATH }}
