name: doubao-murmur
options:
  bundleIdPrefix: com.doubao
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.doubao.murmur
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  doubao-murmur:
    type: application
    platform: macOS
    sources:
      - path: doubao-murmur
        excludes:
          - "*.md"
    settings:
      base:
        INFOPLIST_FILE: doubao-murmur/Info.plist
        CODE_SIGN_ENTITLEMENTS: doubao-murmur/doubao-murmur.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PRODUCT_NAME: "Doubao Murmur"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    info:
      path: doubao-murmur/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "Doubao Murmur needs microphone access to enable voice-to-text transcription."
        CFBundleName: "Doubao Murmur"
        CFBundleDisplayName: "Doubao Murmur"
        CFBundleIconFile: "AppIcon"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    entitlements:
      path: doubao-murmur/doubao-murmur.entitlements
      properties:
        com.apple.security.app-sandbox: false
