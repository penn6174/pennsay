name: PennSay
options:
  bundleIdPrefix: com.voiceinput
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.voiceinput.app
    MARKETING_VERSION: "1.0.5"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PennSay:
    type: application
    platform: macOS
    sources:
      - path: doubao-murmur
      - path: Sources/VoiceInputCore
        excludes:
          - "*.md"
    settings:
      base:
        INFOPLIST_FILE: doubao-murmur/Info.plist
        CODE_SIGN_ENTITLEMENTS: doubao-murmur/doubao-murmur.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PRODUCT_NAME: "PennSay"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    info:
      path: doubao-murmur/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "PennSay needs microphone access to capture speech for transcription."
        CFBundleName: "PennSay"
        CFBundleDisplayName: "PennSay"
        CFBundleIconFile: "AppIcon"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    entitlements:
      path: doubao-murmur/doubao-murmur.entitlements
      properties:
        com.apple.security.app-sandbox: false
